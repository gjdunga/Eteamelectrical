<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="E-Team Electrical logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff3b3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".5"/>
    </filter>
  </defs>
  <rect width="1200" height="280" rx="28" fill="#0b0f16"/>
  <!-- wings -->
  <g opacity=".95">
    <path d="M120 120 h240 v28 h-240 z" fill="url(#g)"/>
    <path d="M120 160 h260 v20 h-260 z" fill="url(#g)" opacity=".85"/>
    <path d="M120 196 h220 v14 h-220 z" fill="url(#g)" opacity=".7"/>
    <path d="M840 120 h240 v28 h-240 z" fill="url(#g)"/>
    <path d="M820 160 h260 v20 h-260 z" fill="url(#g)" opacity=".85"/>
    <path d="M860 196 h220 v14 h-220 z" fill="url(#g)" opacity=".7"/>
  </g>
  <!-- center badge -->
  <g filter="url(#shadow)">
    <rect x="390" y="56" width="420" height="168" rx="22" fill="#101827" stroke="#25324a" stroke-width="4"/>
    <text x="600" y="130" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="84" fill="#e9eef6" letter-spacing="2">E‑TEAM</text>
    <text x="600" y="184" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="40" font-weight="900" fill="url(#g)">ELECTRICAL</text>
  </g>
  <text x="600" y="258" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" fill="#aab7cc">Trade Response Crew • Licensed • Insured • Code‑Compliant</text>
</svg>
